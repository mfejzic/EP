name: P2 CI Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'p2/**'

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image (p2)
        run: docker build -t miniapi ./p2

      - name: Run container
        run: docker run -d -e API_ENV=dev -p 5000:5000 --name app miniapi

      - name: Wait for startup
        run: sleep 5

      - name: Run pytest inside container
        run: docker exec app pytest

      - name: Show logs
        run: docker logs app